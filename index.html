<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Last Candle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600&family=Patrick+Hand&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="screen">

    <!-- Sky -->
    <div id="sky"></div>

    <!-- Stars -->
    <div id="stars"></div>

    <!-- Fog -->
    <div id="fog"></div>

    <!-- Tree -->
    <div id="tree">

        <div class="trunk"></div>

        <div class="canopy one"></div>
        <div class="canopy two"></div>
        <div class="canopy three"></div>

    </div>

    <!-- Lantern -->
    <div id="lantern">
        <div class="light"></div>
    </div>

    <!-- Ground -->
    <div id="ground">

        <div class="hill"></div>

        <div id="grass"></div>

        <div id="flowers"></div>

    </div>

    <!-- Title -->
    <div id="menu">

        <h1>
            The Last<br>
            Candle
        </h1>

        <nav>

            <button id="play">
                follow the light
            </button>

            <button>
                end journey
            </button>

            <button>
                sanctuary
            </button>

        </nav>

    </div>

</div>

<script src="title.js"></script>

</body>

</html>
