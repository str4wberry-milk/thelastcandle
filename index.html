<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Last Candle</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

</head>


<body>


<div id="title-screen">


    <!-- SKY -->

    <div class="sky">


        <div class="moon"></div>


        <div class="stars">

            <span>✦</span>
            <span>✧</span>
            <span>⋆</span>
            <span>•</span>
            <span>✦</span>
            <span>✧</span>

        </div>


    </div>



    <!-- ATMOSPHERE -->

    <div class="mist"></div>



    <!-- WORLD AREA -->

    <div class="world">


        <div class="tree">

            <div class="tree-crown"></div>

            <div class="tree-trunk"></div>

        </div>



        <div class="lantern">

            <div class="lantern-glow"></div>

            <div class="lantern-body"></div>

        </div>


    </div>




    <!-- GROUND -->

    <div class="ground">

        <div class="grass"></div>


        <div class="rocks">

            <div class="rock"></div>
            <div class="rock"></div>
            <div class="rock"></div>

        </div>


    </div>






    <!-- TITLE MENU -->

    <section class="menu">


        <h1>
            The Last<br>
            Candle
        </h1>



        <nav>


            <button class="active">

                <span>✦</span>
                follow the light

            </button>



            <button>

                <span>✦</span>
                sanctuary

            </button>



            <button>

                <span>✦</span>
                end journey

            </button>


        </nav>


    </section>




</div>



<script src="game.js"></script>


</body>

</html>
